<!DOCTYPE html>
<html>
<head>
    <title>Login / Signup</title>
    <link rel="stylesheet" href="css/animated-buttons.css">
    <style>
        body { font-family: Arial; background:#f5f5f5; display:flex; justify-content:center; padding-top:40px; }
        .box { width:350px; background:#fff; padding:25px; border-radius:10px; box-shadow:0 0 10px #ddd; }
        h2 { text-align:center; margin-bottom:20px; }
        input { width:100%; padding:10px; margin:10px 0; border:1px solid #ccc; border-radius:5px; box-sizing: border-box; }
        .button-container { display: flex; justify-content: center; margin-top: 20px; }
    </style>
</head>

<body>
<div class="box">
    <h2>Login / Signup</h2>

    <input id="name" placeholder="Full Name">
    <input id="email" placeholder="Email">
    <input id="phone" placeholder="Mobile Number">

    <div class="button-container">
        <button id="saveUser" class="button btn-login"></button>
    </div>
</div>

<script>
    window.noAutoAuth = true; // Disable auto-redirect on login page
</script>
<script src="js/shared/auth.js"></script>
<script src="login.js"></script>
</body>
</html>
